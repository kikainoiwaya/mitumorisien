<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PDF to Spreadsheet Formatter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .spreadsheet-table {
            border-collapse: collapse;
            width: 100%;
            background-color: #fff;
        }
        .spreadsheet-cell {
            border: 1px solid #e0e0e0;
            padding: 8px 12px;
            min-height: 1.5em;
            word-break: break-all;
            white-space: pre-wrap;
        }
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #059669;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6">
        <h1 class="text-2xl font-bold text-gray-800 mb-4 flex items-center">
            <svg class="w-8 h-8 mr-2 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
            </svg>
            AI文字起こし ➔ スプレッドシート変換（完全単一ファイル版）
        </h1>

        <div id="dropZone" class="mb-6 border-2 border-dashed border-gray-300 rounded-lg p-8 text-center transition-colors duration-200 cursor-pointer hover:border-green-500">
            <input type="file" id="fileInput" class="hidden" accept="application/pdf,image/*">
            <div class="flex flex-col items-center">
                <svg class="w-12 h-12 text-gray-400 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                </svg>
                <p class="text-gray-600 font-medium">PDFまたは画像をアップロード</p>
                <p class="text-gray-400 text-sm mt-1">AIが表構造を解析して列を分けます</p>
                <div id="loader" class="mt-4 flex items-center gap-2 hidden">
                    <div class="loading-spinner"></div>
                    <span class="text-green-600 font-bold">AI解析中...</span>
                </div>
            </div>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2 font-bold text-green-700">1. 解析・編集エリア</label>
            <textarea id="inputArea" class="w-full h-48 p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent resize-y font-mono text-sm overflow-x-auto" placeholder="解析結果がここに表示されます..."></textarea>
            <p class="mt-1 text-xs text-gray-500">※表形式の場合、AIが自動で列（タブ区切り）を作成します。必要に応じてここで手動調整も可能です。</p>
        </div>

        <div class="flex gap-4 mb-8">
            <button onclick="processInput()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded-lg transition duration-200 shadow-sm">
                プレビュー更新
            </button>
            <button onclick="copyResult()" id="copyBtn" class="hidden bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg transition duration-200 shadow-sm">
                スプレッドシート用にコピー
            </button>
        </div>

        <div id="resultContainer" class="hidden">
            <label class="block text-sm font-medium text-gray-700 mb-2 font-bold">2. スプレッドシート用プレビュー（コピー用）</label>
            <div id="output" class="border border-gray-200 rounded-lg overflow-x-auto bg-gray-50 text-sm">
                <!-- ここにtableが生成される -->
            </div>
            <p class="mt-2 text-xs text-gray-500 italic font-medium text-blue-600">※「スプレッドシート用にコピー」ボタンを押すと、クリップボードに表形式データが保持されます。</p>
        </div>
    </div>

    <script>
        // API key will be provided by the environment
        const apiKey = "";
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const inputArea = document.getElementById('inputArea');
        const loader = document.getElementById('loader');

        // File drop and input handling
        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        async function handleFiles(files) {
            const file = files[0];
            if (!file) return;

            loader.classList.remove('hidden');
            inputArea.value = "AIが解析しています...";

            try {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = async () => {
                    const base64Data = reader.result.split(',')[1];
                    const mimeType = file.type;
                    
                    const text = await performAIOCR(base64Data, mimeType);
                    inputArea.value = text;
                    processInput();
                    loader.classList.add('hidden');
                };
            } catch (err) {
                console.error(err);
                alert("ファイルの読み込みに失敗しました。");
                loader.classList.add('hidden');
            }
        }

        async function performAIOCR(base64Data, mimeType) {
            const prompt = `
            Analyze this document and extract the text in a format suitable for spreadsheets.
            [CRITICAL RULES]
            1. Use a TAB character (ASCII 0x09) as a column separator for tables. Do NOT write out "\\t".
            2. Each data row must be on a single line.
            3. Ensure consistent column counts even for complex table layouts.
            4. Provide ONLY the extracted text. No explanations or greetings.
            `;
            
            let retries = 0;
            const delays = [1000, 2000, 4000, 8000, 16000];

            while (retries < 5) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: prompt },
                                    { inlineData: { mimeType: mimeType, data: base64Data } }
                                ]
                            }]
                        })
                    });

                    if (!response.ok) throw new Error("API request failed");

                    const result = await response.json();
                    let rawText = result.candidates?.[0]?.content?.parts?.[0]?.text || "";
                    
                    // Replace literal "\t" strings with actual tab characters if the AI made a mistake
                    rawText = rawText.replace(/\\t/g, '\t');
                    
                    // Remove markdown code blocks if present
                    return rawText.replace(/```[a-z]*\n/gi, '').replace(/```/g, '').trim();
                } catch (err) {
                    await new Promise(res => setTimeout(res, delays[retries]));
                    retries++;
                }
            }
            throw new Error("AI analysis timed out.");
        }

        /**
         * Converts the text in inputArea to a visible HTML table for previewing and copying
         */
        function processInput() {
            const input = inputArea.value;
            const output = document.getElementById('output');
            const resultContainer = document.getElementById('resultContainer');
            const copyBtn = document.getElementById('copyBtn');

            if (!input.trim()) return;

            const lines = input.split(/\r?\n/).filter(line => line.trim() !== "");
            
            let tableHtml = '<table class="spreadsheet-table"><tbody>';
            
            lines.forEach(line => {
                const cells = line.split('\t');
                tableHtml += '<tr>';
                cells.forEach(cellText => {
                    tableHtml += `<td class="spreadsheet-cell">${escapeHtml(cellText)}</td>`;
                });
                tableHtml += '</tr>';
            });
            
            tableHtml += '</tbody></table>';

            output.innerHTML = tableHtml;
            resultContainer.classList.remove('hidden');
            copyBtn.classList.remove('hidden');
        }

        /**
         * Helper to escape HTML characters
         */
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        /**
         * Copies the generated HTML table to the clipboard. 
         * Spreadsheets like Excel/Google Sheets recognize HTML tables and paste them into cells automatically.
         */
        function copyResult() {
            const output = document.getElementById('output');
            
            const range = document.createRange();
            range.selectNode(output);
            const selection = window.getSelection();
            selection.removeAllRanges();
            selection.addRange(range);
            
            try {
                // Using execCommand to ensure broad compatibility with HTML-formatted clipboard data
                document.execCommand('copy');
                const btn = document.getElementById('copyBtn');
                btn.innerText = "コピー完了！";
                btn.classList.replace('bg-blue-600', 'bg-green-500');
                setTimeout(() => { 
                    btn.innerText = "スプレッドシート用にコピー"; 
                    btn.classList.replace('bg-green-500', 'bg-blue-600');
                }, 2000);
            } catch (err) {
                console.error('Copy failed', err);
            }
            selection.removeAllRanges();
        }
    </script>
</body>
</html>
